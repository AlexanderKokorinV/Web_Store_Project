{% extends "catalog/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">Авторизация</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                Войти
                            </button>
                        </div>
                        <div class="mt-2">
                            <a href="{% url 'users:password_reset' %}" class="small text-muted">Забыли пароль?</a>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small>Еще нет аккаунта?<a href="{% url 'users:register' %}">Зарегистрироваться</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
