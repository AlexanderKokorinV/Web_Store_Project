{% extends "catalog/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-warning">
                <div class="card-header bg-warning text-dark text-center">
                    <h4 class="mb-0">Восстановление пароля</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted small">Введите email, указанный при регистрации, и следуйте инструкциям в полученном письме.</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-warning">Отправить ссылку</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
