{% extends "catalog/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Редактирование профиля</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-4 text-center mb-3">
                                {% if user.avatar %}
                                    <img src="{{ user.avatar.url }}" class="img-thumbnail rounded-circle mb-2" style="width: 150px; height: 150px; object-fit: cover;">
                                {% else %}
                                    <div class="bg-light rounded-circle d-flex align-items-center justify-content-center mx-auto mb-2" style="width: 150px; height: 150px;">
                                        <i class="bi bi-person text-secondary" style="font-size: 4rem;"></i>
                                    </div>
                                {% endif %}
                                <p class="small text-muted">{{ user.email }}</p>
                            </div>
                            <div class="col-md-8">
                                {{ form.as_p }}
                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                                    <a href="{% url 'catalog:home' %}" class="btn btn-outline-secondary">Отмена</a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
