services: # описываем сервисы приложения
  web: # сервис django-приложения
    build: . # собираем образ из текущей директории
    # выполняем миграции, собираем статические файлы и запускаем unicorn сервер:
    command: sh -c "poetry run python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app # монтируем текущую директорию
      - static_volume:/app/staticfiles # монтируем том для статических файлов
    # открываем порт 8000 внутри docker-сети:
    expose:
      - "8000"
    # указываем, что сервис зависит от БД и Redis:
    depends_on:
      - db
      - redis
    # указываем файл с переменными окружения:
    env_file:
      - ./.env

  # сервис nginx:
  nginx:
    build: # собираем образ из директории nginx:
      context: ./nginx
    # пробрасываем порт 80 на хост машины
    ports:
      - "80:80"
    # монтируем конфигурационный файл nginx и том со статическими файлами:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    # указываем, что сервис nginxs зависит от сервиса web:
    depends_on:
      - web

  # сервис PostgreSQL
  db:
    image: postgres:16 # используем официальный образ версии 16
    # монтируем том для хранения данных БД
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    # указываем файл с переменными окружения:
    env_file:
      - ./.env

  # сервис Redis
  redis:
    image: redis:7 # используем официальный образ Redis
    # монтируем том для хранения данных Redis:
    volumes:
      - redis_data:/data
    # указываем файл с переменными окружения:
    env_file:
      - ./.env

# объявляем тома для сохранения данных между перезапусками:
volumes:
  postgres_data:
  static_volume:
  redis_data:





