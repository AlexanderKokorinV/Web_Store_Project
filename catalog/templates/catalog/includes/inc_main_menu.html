<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'catalog:home' %}">Web Store Project</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'catalog:home' %}">Главная</a>
                </li>
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'users:profile' %}">
                            {% if user.avatar %}
                                <img src="{{ user.avatar.url }}" width="24" height="24" class="rounded-circle me-1" style="object-fit: cover;">
                            {% else %}
                                <i class="bi bi-person-circle"></i>
                            {% endif %}
                            Профиль ({{ user.email }})
                        </a>
                    </li>
                    <li class="nav-item d-flex align-items-center">
                        <form method="post" action="{% url 'users:logout' %}" class="d-inline m-0 p-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link m-0 p-0 border-0" style="line-height: inherit;">
                                Выйти
                            </button>
                        </form>
                    </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:login' %}">Войти</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:register' %}">Зарегистрироваться</a>
                </li>
                {% endif %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'catalog:contacts' %}">Контакты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'blog:blog_post_list' %}">Наш блог</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
